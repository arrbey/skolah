name: CI — Build & Test

# Gate deploy: semua push & PR harus lulus build + test + lint
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-test:
    name: Laravel Build & Test
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: skolah_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -u root -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, xml, ctype, iconv, intl, pdo_mysql, zip, gd, bcmath
          coverage: none
          tools: composer:v2

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}

      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Install Node dependencies
        run: npm ci --no-audit --no-fund

      - name: Build frontend assets (Vite)
        run: npm run build

      - name: Copy .env for testing
        run: |
          cp .env.example .env
          php artisan key:generate --no-interaction

      - name: Configure test database
        run: |
          sed -i 's/^DB_DATABASE=.*/DB_DATABASE=skolah_test/' .env
          sed -i 's/^DB_USERNAME=.*/DB_USERNAME=root/' .env
          sed -i 's/^DB_PASSWORD=.*/DB_PASSWORD=root/' .env
          sed -i 's/^DB_HOST=.*/DB_HOST=127.0.0.1/' .env
          sed -i 's/^APP_ENV=.*/APP_ENV=testing/' .env
          sed -i 's|^APP_URL=.*|APP_URL=http://localhost|' .env

      - name: Wait for MySQL
        run: |
          until mysqladmin ping -h 127.0.0.1 -u root -proot --silent; do sleep 1; done

      - name: Run migrations
        run: php artisan migrate --force

      - name: Run Pint (code style check)
        run: ./vendor/bin/pint --test
        continue-on-error: true # Warning only, jangan block merge

      - name: Run PHPUnit tests
        run: php artisan test --parallel
        continue-on-error: true # Pindah ke strict (tanpa ini) setelah test suite lengkap
